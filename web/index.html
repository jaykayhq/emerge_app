<!DOCTYPE html>
<html lang="en">

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Emerge — Transform your habits through identity-first design. Build lasting change with gamified progression, archetypes, and AI coaching.">

  <meta name="color-scheme" content="dark light">

  <!-- SEO Meta Tags -->
  <meta name="keywords" content="habits, productivity, self-improvement, gamification, identity, habit tracker">
  <meta name="author" content="Emerge">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Emerge — Identity-First Habit Engine">
  <meta property="og:description"
    content="Transform your habits through identity-first design. Build lasting change with gamified progression.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta name="twitter:card" content="summary_large_image">

  <!-- iOS PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Emerge">

  <!-- iOS Touch Icons (multiple sizes for various devices) -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-152.png">
  <link rel="apple-touch-icon" sizes="144x144" href="icons/Icon-144.png">
  <link rel="apple-touch-icon" sizes="128x128" href="icons/Icon-128.png">

  <!-- iOS Splash Screen (using apple-touch-startup-image) -->
  <link rel="apple-touch-startup-image" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <title>Emerge</title>

  <style>
    /* Minimal loader style if needed */
    body {
      background-color: #2A1B4E;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <!-- PWA Install Banner -->


  <!-- Flutter App -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Safeguard: Unregister any existing service workers if they cause trouble
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log('[PWA] Unregistered service worker');
        }
      });
    }
  </script>
</body>

</html>
